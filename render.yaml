services:
  - type: web
    name: emmanuel-portfolio-api
    runtime: node
    plan: free
    buildCommand: cd backend && npm install && npm run build
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
    # Set in dashboard: MONGODB_URI, JWT_SECRET, CORS_ORIGIN, CLOUDINARY_*, ADMIN_EMAIL, ADMIN_PASSWORD
